<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#2A1F17"/>

  <!-- Four jars showing depletion progression: full → 2/3 → 1/3 → empty -->

  <!-- Jar 1: FULL -->
  <g transform="translate(52, 120)">
    <!-- body -->
    <rect x="0" y="28" width="72" height="120" rx="10" fill="#F0EBE3"/>
    <!-- lid -->
    <rect x="6" y="14" width="60" height="18" rx="5" fill="#B5613A"/>
    <!-- fill: 100% -->
    <rect x="4" y="32" width="64" height="112" rx="7" fill="#B5613A" opacity="0.85"/>
    <!-- shine -->
    <rect x="8" y="38" width="10" height="50" rx="5" fill="white" opacity="0.2"/>
  </g>

  <!-- Arrow 1 -->
  <text x="140" y="208" font-family="sans-serif" font-size="32" fill="#FAF7F3" opacity="0.4">›</text>

  <!-- Jar 2: 2/3 -->
  <g transform="translate(168, 120)">
    <rect x="0" y="28" width="72" height="120" rx="10" fill="#F0EBE3"/>
    <rect x="6" y="14" width="60" height="18" rx="5" fill="#C09030"/>
    <!-- fill: 66% -->
    <rect x="4" y="68" width="64" height="76" rx="7" fill="#C09030" opacity="0.8"/>
    <rect x="8" y="74" width="10" height="36" rx="5" fill="white" opacity="0.2"/>
  </g>

  <!-- Arrow 2 -->
  <text x="256" y="208" font-family="sans-serif" font-size="32" fill="#FAF7F3" opacity="0.4">›</text>

  <!-- Jar 3: 1/3 -->
  <g transform="translate(284, 120)">
    <rect x="0" y="28" width="72" height="120" rx="10" fill="#F0EBE3"/>
    <rect x="6" y="14" width="60" height="18" rx="5" fill="#B5613A"/>
    <!-- fill: 30% -->
    <rect x="4" y="108" width="64" height="36" rx="7" fill="#B5613A" opacity="0.9"/>
    <rect x="8" y="112" width="10" height="18" rx="5" fill="white" opacity="0.2"/>
  </g>

  <!-- Arrow 3 -->
  <text x="373" y="208" font-family="sans-serif" font-size="32" fill="#FAF7F3" opacity="0.4">›</text>

  <!-- Jar 4: EMPTY -->
  <g transform="translate(400, 120)">
    <rect x="0" y="28" width="72" height="120" rx="10" fill="#F0EBE3" opacity="0.3"/>
    <rect x="6" y="14" width="60" height="18" rx="5" fill="#B5613A" opacity="0.3"/>
    <!-- empty: just a faint outline -->
    <rect x="0" y="28" width="72" height="120" rx="10" fill="none" stroke="#B5613A" stroke-width="3" stroke-dasharray="8 4" opacity="0.5"/>
    <!-- X mark -->
    <line x1="18" y1="65" x2="54" y2="105" stroke="#B5613A" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
    <line x1="54" y1="65" x2="18" y2="105" stroke="#B5613A" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- Labels below jars -->
  <text x="88"  y="302" font-family="sans-serif" font-size="20" fill="#5A7A5C"  text-anchor="middle">full</text>
  <text x="204" y="302" font-family="sans-serif" font-size="20" fill="#C09030"  text-anchor="middle">soon</text>
  <text x="320" y="302" font-family="sans-serif" font-size="20" fill="#B5613A"  text-anchor="middle">low</text>
  <text x="436" y="302" font-family="sans-serif" font-size="20" fill="#B5613A" text-anchor="middle" opacity="0.5">out</text>

  <!-- Timeline bar below -->
  <rect x="60" y="330" width="396" height="12" rx="6" fill="#F0EBE3" opacity="0.1"/>
  <!-- Timeline gradient fill -->
  <rect x="60" y="330" width="99"  height="12" rx="0" fill="#5A7A5C" opacity="0.7"/>
  <rect x="159" y="330" width="99" height="12" rx="0" fill="#C09030" opacity="0.7"/>
  <rect x="258" y="330" width="99" height="12" rx="0" fill="#B5613A" opacity="0.7"/>
  <rect x="357" y="330" width="99" height="12" rx="6" fill="#B5613A" opacity="0.3"/>

  <!-- Time arrow below timeline -->
  <line x1="60" y1="370" x2="440" y2="370" stroke="#FAF7F3" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
  <polygon points="440,362 456,370 440,378" fill="#FAF7F3" opacity="0.3"/>
  <text x="228" y="400" font-family="sans-serif" font-size="22" fill="#FAF7F3" opacity="0.3" text-anchor="middle">time →</text>
</svg>
